# Vanilla multi-agent debate with plurality-voting aggregation.
#
# 实验流程.md spec: N=5 agents, 3 fixed rounds, fully connected, no judge,
# majority vote on extracted answers.
#
# task_type: "auto" lets methods/mad_vote/extractor.py infer math/mcq from the
# dataset name (DATASET_TASK_TYPE map). Set to "math" or "mcq" to force.
#
# Correctness is judged by xverify but with a per-sample cache keyed on the
# CANONICAL extracted answer (not the raw response). This preserves xverify's
# accuracy while guaranteeing that the same canonical answer always gets the
# same verdict, which in turn guarantees the three diagnostic buckets are
# mutually exclusive and complete (vote-winner is one of the canonicals, so
# vote_correct == is_correct of any agent who voted for the winner).
#
# The xverify endpoint named below MUST exist in
# model_api_configs/model_api_config.json.

agents_num: 5
rounds_num: 3
task_type: auto
xverify_model_name: xverify-9b-c
xverify_max_tokens: 64
xverify_temperature: 0.0
