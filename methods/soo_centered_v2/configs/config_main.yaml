method_name: soo_centered_v2
random_seed: 2025
roles: ["Assistant", "Programmer", "Mathematician", "Economist", "Psychologist", "Historian"]

num_agents: 5
top_k: 2
max_rounds: 2
consensus_min_sim: 0.95
sim_threshold: 0.75

temperature: 0.5
enforce_dag: true
aggregate_mode: "weighted"   # "weighted" / "single"
embedding_dim: 512
consensus_range_eps: 0.1
reform: true

# SOO-Centered-v2 specific: total variance threshold for consensus detection.
# If tr(S_c) < this, agents are in genuine consensus and debate is skipped.
variance_consensus_thr: 0.05

emb_model: model/all-MiniLM-L6-v2
