# Cluster A — variant A3: mad_vote + Contribution-weighted Aggregation only.
# Round-0 and every per-round vote tally each agent's canonical answer with
# its PC1 softmax contribution score (instead of uniform 1/N). Triggering
# stays off (full 3 rounds), Routing stays full mesh — so this isolates the
# aggregation module's marginal effect.

agents_num: 5
rounds_num: 3
task_type: auto

xverify_model_name: xverify-9b-c
xverify_max_tokens: 64
xverify_temperature: 0.0

enable_triggering: false
enable_routing: false
enable_weighted_aggregation: true

top_k: 2
variance_consensus_thr: 0.05
answer_consensus_min: 3
emb_model: model/all-MiniLM-L6-v2
