# Cluster A — variant A2: mad_vote + Contribution-guided Top-k DAG Routing.
# Replaces the round t->t+1 fully-connected peer broadcast with each agent
# seeing only its top-k=2 peers ranked by PC1 contribution from the previous
# round (deterministic; diversity_p hard-coded to 0). Triggering off, so the
# debate still runs the full 3 rounds.

agents_num: 5
rounds_num: 3
task_type: auto

xverify_model_name: xverify-9b-c
xverify_max_tokens: 64
xverify_temperature: 0.0

enable_triggering: false
enable_routing: true
enable_weighted_aggregation: false

top_k: 2
variance_consensus_thr: 0.05
answer_consensus_min: 3
emb_model: model/all-MiniLM-L6-v2
