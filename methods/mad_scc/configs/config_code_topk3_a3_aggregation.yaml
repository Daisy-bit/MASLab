# Cluster A (code, topk3 family) — variant A3: + Aggregation only.
# Identical to config_code_a3_aggregation.yaml except top_k=3 (kept for
# matrix symmetry; routing is off so top_k is not consulted).
#
# NOTE: enable_weighted_aggregation is moot. On code with
# enable_answer_consensus=false, _vote bypasses plurality entirely and
# returns the argmax-contribution agent's code regardless of the
# enable_weighted_aggregation flag. We set it True for symmetry with the
# math/MCQ A3 cell.

agents_num: 5
rounds_num: 3
task_type: code

xverify_model_name: xverify-9b-c
xverify_max_tokens: 64
xverify_temperature: 0.0

enable_triggering: false
enable_routing: false
enable_weighted_aggregation: true

enable_answer_consensus: false

top_k: 3
variance_consensus_thr: 0.05
answer_consensus_min: 3
emb_model: model/all-MiniLM-L6-v2

sim_threshold: 0.75
diversity_p: 0.0
enforce_dag: true

equiv_protocol: task_aware

emit_diagnostic: true
