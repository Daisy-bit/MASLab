# Cluster A (code) — variant A0: vanilla mad_vote baseline for
# HumanEval / MBPP. No SCC modules. enable_triggering=false → no early
# stop, full max_rounds debate. _vote uses BLEU plurality on the
# extracted code (enable_answer_consensus=true).

agents_num: 5
rounds_num: 3
task_type: code

# xverify cannot grade code; mad_vote._call_xverify short-circuits when
# task_type=="code". Diagnostic schema still emits but per-agent is_correct
# flags are all False (documented behaviour). Downstream pass@1 comes from
# evaluations/evaluate_code.py.
xverify_model_name: xverify-9b-c
xverify_max_tokens: 64
xverify_temperature: 0.0

# Baseline: all SCC modules off.
enable_triggering: false
enable_routing: false
enable_weighted_aggregation: false

# Plurality ON → BLEU clustering at final vote (no early stop because
# enable_triggering is also off).
enable_answer_consensus: true

top_k: 2
variance_consensus_thr: 0.05
answer_consensus_min: 3
emb_model: model/all-MiniLM-L6-v2

sim_threshold: 0.75
diversity_p: 0.0
enforce_dag: true

equiv_protocol: task_aware

# Disable diagnostic emission (xverify cannot judge code; downstream pass@1
# comes from evaluations/evaluate_code.py).
emit_diagnostic: true
